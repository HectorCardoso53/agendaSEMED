<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Agenda - Secretaria Municipal de Eficiência Gooprnnamental</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS do sistema -->
  <link rel="stylesheet" href="css/home.css">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" defer></script>
</head>

<body>
  <!-- ================= HEADER ================= -->
  <header class="header-semed">
    <button id="btnLogout" class="btn btn-light header-action right">
      <i class="bi bi-box-arrow-right"></i> Sair
    </button>

    <div class="header-center">
      <img src="images/logo.png" alt="Logo SEMEG" class="header-logo">
      <h1 class="header-title">Agenda – Secretaria Municipal de Eficiência Governamental</h1>
    </div>
  </header>

  <!-- ================= CONTEÚDO ================= -->
  <main class="container py-4">

    <!-- Próximo compromisso -->
    <section id="proximo-compromisso" class="card card-alerta mb-3">
      <h4 class="fw-bold">🔔 Próximo compromisso</h4>
      <p id="compromissoProximoTexto" class="mb-0 text-secondary">Carregando...</p>
    </section>

    <!-- Compromissos -->
    <section id="agenda">
      <h2 class="section-title mb-3">Compromissos</h2>

      <label for="selectMes" class="form-label fw-semibold">Selecione o mês</label>
      <select id="selectMes" class="form-select mb-3">
        <option value="Janeiro2026">Janeiro 2026</option>
        <option value="Fevereiro2026">Fevereiro 2026</option>
        <option value="Março2026">Março 2026</option>
        <option value="Abril2026">Abril 2026</option>
        <option value="Maio2026">Maio 2026</option>
        <option value="Junho2026">Junho 2026</option>
        <option value="Julho2026">Julho 2026</option>
        <option value="Agosto2026">Agosto 2026</option>
        <option value="Setembro2026">Setembro 2026</option>
        <option value="Outubro2026">Outubro 2026</option>
        <option value="Novembro2026">Novembro 2026</option>
        <option value="Dezembro2026">Dezembro 2026</option>
      </select>

      <label for="filtroStatus" class="form-label fw-semibold">Filtrar compromissos</label>
      <select id="filtroStatus" class="form-select mb-3">
        <option value="todos">Todos</option>
        <option value="pendentes">Pendentes</option>
        <option value="concluidos">Concluídos</option>
      </select>

      <input id="searchAgenda" type="text" class="form-control mb-3" placeholder="Pesquisar compromisso...">

      <ul id="taskList" class="list-group mb-3"></ul>

      <button id="btnAddTask" class="btn btn-primary w-100 mb-3" data-bs-toggle="modal" data-bs-target="#modalAddTask">
        <i class="bi bi-plus-circle"></i> Adicionar Compromisso
      </button>
    </section>

  </main>

  <!-- ================= MODAL NOVO COMPROMISSO ================= -->
<div class="modal fade" id="modalAddTask" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">

      <!-- TOPO LARANJA COM LOGO -->
      <div class="modal-header modal-header-semed text-white rounded-top-4">
        <div class="d-flex align-items-center gap-3">
          <div>
            <h5 class="modal-title mb-0 fw-bold">Novo Compromisso</h5>
            <small class="opacity-75">Secretaria Municipal de Eficiência Governamental</small>
          </div>
        </div>
        <button type="button" class="btn-close btn-close-white"
          data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-4">

        <form id="formAddTask">

          <div class="mb-3">
            <label class="form-label fw-semibold">Nome do compromisso</label>
            <input type="text" id="nome" class="form-control form-control-lg" required>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Data</label>
              <input type="date" id="data" class="form-control form-control-lg" required>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Hora</label>
              <input type="time" id="horario" class="form-control form-control-lg" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Local de saída</label>
            <input type="text" id="localSaida" class="form-control form-control-lg">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Destino</label>
            <input type="text" id="destino" class="form-control form-control-lg">
          </div>

          <button type="submit" class="btn btn-semed w-100 py-2 fw-bold">
            <i class="bi bi-check-circle"></i> Salvar Compromisso
          </button>

        </form>

      </div>
    </div>
  </div>
</div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer-semed">
    © 2026 Secretaria Municipal de Eficiência Governamental
  </footer>

  <!-- Script principal -->
  <script type="module" src="js/main/adminAgendaPage.js"></script>

</body>

</html>
